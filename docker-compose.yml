services:
  postgres:
    image: postgres:16
    container_name: uav-logistics-postgres
    environment:
      POSTGRES_DB: uav_logistics
      POSTGRES_USER: uav
      POSTGRES_PASSWORD: uav
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uav -d uav_logistics"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
